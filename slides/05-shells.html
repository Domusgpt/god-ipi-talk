<!--
  SLIDE 5 — SIX SHELLS — PERFECT TYPE SEPARATION
  ═══════════════════════════════════════════════
  Duration: ~2 minutes
  Purpose:  Show the palindromic shell structure in detail.

  THE SIX SHELLS (from monograph Theorem 5, Table 1):
  ───────────────────────────────────────────────────
  The shell index k runs over {-3, -2, -1, +1, +2, +3}.
  For the presentation we label them 0..5 for simplicity.

  k=-3 (Shell 0):  24 roots — ALL S+ (spinor)     — Cyan
  k=-2 (Shell 1):  56 roots — ALL D8 (integer)    — Gold
  k=-1 (Shell 2):  40 roots — ALL S+ (spinor)     — Cyan
  k=+1 (Shell 3):  40 roots — ALL S+ (spinor)     — Cyan
  k=+2 (Shell 4):  56 roots — ALL D8 (integer)    — Gold
  k=+3 (Shell 5):  24 roots — ALL S+ (spinor)     — Cyan

  PERFECT TYPE SEPARATION (Proved):
  No shell contains roots of BOTH types. D8 roots appear
  ONLY in shells k=±2. S+ roots appear ONLY in shells k=±1, ±3.

  This is forced by the Z vs Z+½ arithmetic of the 8th coordinate
  (the projection shift formula, Theorem 4 in the monograph).

  D8 total: 56 + 56 = 112 ✓
  S+ total: 24 + 40 + 40 + 24 = 128 ✓

  ANIMATION: Cards appear one by one (see animations.js).
-->

  data-notes="~2 min. Cards appear one by one. 'Every shell is type-pure. Shell 0: 24 spinor roots — all cyan. Shell 1: 56 integer roots — all gold. Shell 2: 40 spinor roots. And the mirror: 40, 56, 24. PERFECT type separation — no shell mixes types. This is proved, not assumed.' Let the animation play out.">
