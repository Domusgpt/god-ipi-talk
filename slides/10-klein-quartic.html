<!--
  SLIDE 10 — THE KLEIN QUARTIC
  ═════════════════════════════
  Duration: ~2 minutes
  Purpose:  Show the beautiful geometry that encodes PSL(2,7).

  THE KLEIN QUARTIC:
  ──────────────────
  Discovered by Felix Klein in 1879, this is a genus-3 Riemann surface
  (a "donut with 3 holes") that achieves the maximum possible number
  of symmetries for its genus: 168 = 84(g-1) = 84(3-1) = 168.

  This is the Hurwitz bound — no genus-3 surface can have more than
  168 automorphisms. The Klein quartic achieves this bound exactly.

  Its symmetry group is PSL(2,7) — the same group that counts the
  non-orthogonal rotation plane pairs in E8.

  The surface can be tiled by 24 regular heptagons (7-sided polygons)
  in the hyperbolic plane. This is the {7,3} tiling — each heptagon
  meets 3 others at each vertex.

  CONNECTION TO E8:
  The 168 non-orthogonal pairs and 210 orthogonal pairs of rotation
  planes are not arbitrary — they reflect the symmetry of this surface
  embedded in the structure of 8-dimensional rotation.
-->
