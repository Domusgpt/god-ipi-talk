<style>
:root{--gold:#c8a96e;--gold-dim:#5a4a30;--gold-bright:#e8c97e;--orange:#ff6b35;--cyan:#00e5ff;--purple:#bf7fff;--red:#ff3355;--green:#44ff88;--deep:#020208;--panel:rgba(3,3,10,0.95);--border:rgba(200,169,110,0.14);--text:#e8e0d4;--text-dim:#7a7060;--mono:'Space Mono',monospace;--serif:'Crimson Pro',serif}
*{margin:0;padding:0;box-sizing:border-box}

<body>

<div class="topbar">

  <span class="topbar-title">KLEIN QUARTIC &middot; DEEP EXPLORATION</span>

</div>

<div class="hud hud-tl" id="htl"></div>

  <div class="narr-text" id="nx"></div>
  <div class="narr-eq" id="ne"></div>
</div>

<div class="drawer-handle">
  <div class="drawer-tab" id="dtab">
    <div class="grip" onclick="document.querySelector('.drawer-body').classList.toggle('open')"></div>

      <div class="ctrl-row"><span class="ctrl-lbl">BLOOM</span><input type="range" min="0" max="100" value="45" id="sl-bloom"><span class="sv" id="sv-bloom">0.45</span></div>
      <div class="ctrl-row"><span class="ctrl-lbl">SPEED</span><input type="range" min="0" max="200" value="50" id="sl-speed"><span class="sv" id="sv-speed">0.5</span></div>
      <div class="ctrl-row"><span class="ctrl-lbl">OPACITY</span><input type="range" min="5" max="100" value="70" id="sl-opacity"><span class="sv" id="sv-opacity">70</span></div>

        <button class="tog on" id="t-boundary" onclick="toggleVis('boundary',this)">BOUNDARY</button>
        <button class="tog" id="t-dual" onclick="toggleVis('dual',this)">DUAL OVERLAY</button>
      </div>
      <div class="math-box" id="mbox">|PSL(2,7)| = 168 = 84(g−1)<br>genus 3 · Hurwitz bound · {7,3} tiling<br>24 vertices · 84 edges · 56 faces</div>

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const TAU=Math.PI*2, PI=Math.PI, PHI=(1+Math.sqrt(5))/2;

// ── SCENE ──
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020208);
scene.fog=new THREE.FogExp2(0x020208,0.018);

const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.01,200);
camera.position.set(0,3,4);

const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance',preserveDrawingBuffer:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.3;
document.getElementById('cv')?.remove();
document.body.prepend(renderer.domElement);
renderer.domElement.id='cv';

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.minDistance=0.1;
controls.maxDistance=30;
controls.target.set(0,0,0);

// ── BLOOM ──
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.45,0.9,0.35);
composer.addPass(bloom);

// ── RESIZE ──
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

// ── STATE ──
const vis={edges:true,fills:true,verts:true,boundary:true,dual:false};
let speed=0.5, opacity=0.7, maxDepth=5, t=0;
let currentMode=0, narrTimer=null;
let vpTarget=null, vpLookTarget=null, vpLerp=0;

function toggleVis(key,btn){vis[key]=!vis[key];btn.classList.toggle('on',vis[key]);updateVisibility();}
window.toggleVis=toggleVis;

// ── GROUPS ──
const poincareGroup=new THREE.Group();
const genusGroup=new THREE.Group();
const hyperGroup=new THREE.Group();
const fanoGroup=new THREE.Group();
const dualGroup=new THREE.Group();
const symmetryGroup=new THREE.Group();
const sigmaGroup=new THREE.Group();
const boundaryGroup=new THREE.Group();

scene.add(poincareGroup, genusGroup, hyperGroup, fanoGroup, dualGroup, symmetryGroup, sigmaGroup, boundaryGroup);

// ── MATERIALS ──
const depthMats=[];
for(let d=0;d<8;d++){
  const hue=(d*40+30)%360;
  depthMats.push(new THREE.MeshBasicMaterial({
    color:new THREE.Color(`hsl(${hue},55%,50%)`),
    transparent:true, opacity:0.18-d*0.018, side:THREE.DoubleSide, depthWrite:false
  }));
}
const edgeMats=[];
for(let d=0;d<8;d++){
  const hue=(d*40+30)%360;
  edgeMats.push(new THREE.LineBasicMaterial({
    color:new THREE.Color(`hsl(${hue},65%,60%)`),
    transparent:true, opacity:0.55-d*0.06
  }));
}
const vertMat=new THREE.MeshBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.9});
const vertGlowMat=new THREE.MeshBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.12,depthWrite:false});
const vertGeo=new THREE.SphereGeometry(0.015,6,6);
const vertGlowGeo=new THREE.SphereGeometry(0.05,8,8);

// ═══════════════════════════════════════════════
// {7,3} POINCARE DISK TILING — 3D mesh faces
// ═══════════════════════════════════════════════
const DISK_R=2.0;
let heptCount=0;

function buildPoincare(){
  // Clear previous
  while(poincareGroup.children.length) poincareGroup.remove(poincareGroup.children[0]);
  heptCount=0;

  // Boundary circle
  while(boundaryGroup.children.length) boundaryGroup.remove(boundaryGroup.children[0]);
  const ringGeo=new THREE.RingGeometry(DISK_R-0.005,DISK_R+0.005,128);
  const ringMat=new THREE.MeshBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.2,side:THREE.DoubleSide});
  const ring=new THREE.Mesh(ringGeo,ringMat);
  ring.rotation.x=-PI/2;
  boundaryGroup.add(ring);

  // Disk background
  const diskGeo=new THREE.CircleGeometry(DISK_R,128);
  const diskMat=new THREE.MeshBasicMaterial({color:0x050510,transparent:true,opacity:0.5,side:THREE.DoubleSide});
  const disk=new THREE.Mesh(diskGeo,diskMat);
  disk.rotation.x=-PI/2;
  disk.position.y=-0.002;
  boundaryGroup.add(disk);

  buildHeptagon(0,0,DISK_R*0.28,0,0);
  updateHUD();
}

function buildHeptagon(cx,cz,r,depth,parentAngle){
  if(depth>maxDepth||r<0.005) return;
  heptCount++;

  const pts=[];
  for(let i=0;i<7;i++){
    const a=TAU*i/7+parentAngle;
    pts.push([cx+Math.cos(a)*r, cz+Math.sin(a)*r]);
  }

  // Face mesh
  if(vis.fills){
    const shape=new THREE.Shape();
    shape.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<7;i++) shape.lineTo(pts[i][0],pts[i][1]);
    shape.closePath();
    const geo=new THREE.ShapeGeometry(shape);
    const mat=depthMats[Math.min(depth,7)];
    const mesh=new THREE.Mesh(geo,mat);
    mesh.rotation.x=-PI/2;
    mesh.position.y=depth*0.001;
    poincareGroup.add(mesh);
  }

  // Edge lines
  if(vis.edges){
    const linePoints=[];
    for(let i=0;i<=7;i++){
      const p=pts[i%7];
      linePoints.push(new THREE.Vector3(p[0],depth*0.001+0.0005,p[1]));
    }
    const lineGeo=new THREE.BufferGeometry().setFromPoints(linePoints);
    const lineMesh=new THREE.Line(lineGeo,edgeMats[Math.min(depth,7)]);
    poincareGroup.add(lineMesh);
  }

  // Vertex dots with glow halos
  if(vis.verts&&depth<4){
    pts.forEach(p=>{
      const dot=new THREE.Mesh(vertGeo,vertMat);
      dot.position.set(p[0],depth*0.001+0.002,p[1]);
      poincareGroup.add(dot);
      if(depth<2){
        const glow=new THREE.Mesh(vertGlowGeo,vertGlowMat);
        glow.position.copy(dot.position);
        poincareGroup.add(glow);
      }
    });
  }

  // Recurse
  if(depth<maxDepth){
    for(let i=0;i<7;i++){
      const a=TAU*i/7+TAU/14+parentAngle;
      const shrink=0.52-depth*0.01;
      const dist=r*1.35;
      const ncx=cx+Math.cos(a)*dist;
      const ncz=cz+Math.sin(a)*dist;
      const dx=ncx, dz=ncz;
      if(Math.sqrt(dx*dx+dz*dz)+r*shrink<DISK_R*0.97){
        buildHeptagon(ncx,ncz,r*shrink,depth+1,a+PI);
      }
    }
  }
}

// ═══════════════════════════════════════════════
// DUAL {3,7} TILING — triangles meeting 7 at vertex
// Built from heptagon centers as vertices
// ═══════════════════════════════════════════════
function buildDual(){
  while(dualGroup.children.length) dualGroup.remove(dualGroup.children[0]);

  // Collect heptagon centers from a recursive pass
  const centers=[];
  function collectCenters(cx,cz,r,depth,pa){
    if(depth>Math.min(maxDepth,4)||r<0.01) return;
    centers.push([cx,cz,r,depth]);
    if(depth<Math.min(maxDepth,4)){
      for(let i=0;i<7;i++){
        const a=TAU*i/7+TAU/14+pa;
        const shrink=0.52-depth*0.01;
        const ncx=cx+Math.cos(a)*r*1.35;
        const ncz=cz+Math.sin(a)*r*1.35;
        if(Math.sqrt(ncx*ncx+ncz*ncz)+r*shrink<DISK_R*0.97){
          collectCenters(ncx,ncz,r*shrink,depth+1,a+PI);
        }
      }
    }
  }
  collectCenters(0,0,DISK_R*0.28,0,0);

  // Connect nearby centers to form triangles (Delaunay-like)
  const triMat=new THREE.MeshBasicMaterial({color:0xff3355,transparent:true,opacity:0.08,side:THREE.DoubleSide,depthWrite:false});
  const triEdgeMat=new THREE.LineBasicMaterial({color:0xff3355,transparent:true,opacity:0.2});

  for(let i=0;i<centers.length;i++){
    for(let j=i+1;j<centers.length;j++){
      const dx=centers[i][0]-centers[j][0], dz=centers[i][1]-centers[j][1];
      const d=Math.sqrt(dx*dx+dz*dz);
      const threshold=centers[i][2]*1.5+centers[j][2]*1.5;
      if(d<threshold&&d>0.01){
        // Edge line
        const pts=[
          new THREE.Vector3(centers[i][0],0.005,centers[i][1]),
          new THREE.Vector3(centers[j][0],0.005,centers[j][1])
        ];
        dualGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),triEdgeMat));
      }
    }
  }

  // Dual vertex dots at heptagon centers
  const dualVertMat=new THREE.MeshBasicMaterial({color:0xff3355,transparent:true,opacity:0.6});
  centers.forEach(c=>{
    const dot=new THREE.Mesh(new THREE.SphereGeometry(0.012,6,6),dualVertMat);
    dot.position.set(c[0],0.006,c[1]);
    dualGroup.add(dot);
  });
}

// ═══════════════════════════════════════════════
// GENUS-3 SURFACE — 3-holed torus with Klein vertices
// ═══════════════════════════════════════════════
function buildGenus3(){
  while(genusGroup.children.length) genusGroup.remove(genusGroup.children[0]);

  const R=1.2, r=0.45; // Major/minor radii for tori
  const segs=64, tubSegs=32;

  // Build 3 connected tori
  for(let ti=0;ti<3;ti++){
    const baseAngle=TAU*ti/3;
    const positions=[], indices=[], uvs=[];

    for(let i=0;i<=segs;i++){
      const u=TAU*i/segs;
      for(let j=0;j<=tubSegs;j++){
        const v=TAU*j/tubSegs;
        // Torus parameterization with offset
        const cx=Math.cos(baseAngle)*R*0.6;
        const cz=Math.sin(baseAngle)*R*0.6;
        const lr=r*(1+0.15*Math.sin(u*3)); // slight genus warping
        const x=cx+(R*0.55+lr*Math.cos(v))*Math.cos(u+baseAngle);
        const z=cz+(R*0.55+lr*Math.cos(v))*Math.sin(u+baseAngle);
        const y=lr*Math.sin(v)*0.9;
        positions.push(x,y,z);
        uvs.push(i/segs,j/tubSegs);
      }
    }

    for(let i=0;i<segs;i++){
      for(let j=0;j<tubSegs;j++){
        const a=i*(tubSegs+1)+j;
        const b=a+tubSegs+1;
        indices.push(a,b,a+1, b,b+1,a+1);
      }
    }

    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
    geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    const hue=(ti*120+200)%360;
    const mat=new THREE.MeshStandardMaterial({
      color:new THREE.Color(`hsl(${hue},50%,40%)`),
      transparent:true, opacity:0.25, side:THREE.DoubleSide,
      metalness:0.3, roughness:0.6, depthWrite:false,
      wireframe:false
    });
    const mesh=new THREE.Mesh(geo,mat);
    genusGroup.add(mesh);

    // Wireframe overlay
    const wireMat=new THREE.MeshBasicMaterial({
      color:new THREE.Color(`hsl(${hue},60%,55%)`),
      transparent:true, opacity:0.08, wireframe:true, side:THREE.DoubleSide
    });
    genusGroup.add(new THREE.Mesh(geo.clone(),wireMat));
  }

  // Add ambient + directional lights for genus surface
  const ambLight=new THREE.AmbientLight(0x222244,0.6);
  ambLight.userData.genusLight=true;
  genusGroup.add(ambLight);
  const dirLight=new THREE.DirectionalLight(0xc8a96e,0.8);
  dirLight.position.set(3,5,2);
  dirLight.userData.genusLight=true;
  genusGroup.add(dirLight);

  // Place 24 Klein quartic vertices on the surface
  const kleinVerts=[];
  for(let i=0;i<24;i++){
    const torusIdx=i%3;
    const angle=TAU*(Math.floor(i/3))/8;
    const baseAngle=TAU*torusIdx/3;
    const cx=Math.cos(baseAngle)*R*0.6;
    const cz=Math.sin(baseAngle)*R*0.6;
    const vAngle=TAU*(i%8)/8;
    const x=cx+(R*0.55+r*Math.cos(vAngle))*Math.cos(angle+baseAngle);
    const z=cz+(R*0.55+r*Math.cos(vAngle))*Math.sin(angle+baseAngle);
    const y=r*Math.sin(vAngle)*0.9;
    kleinVerts.push(new THREE.Vector3(x,y,z));

    const dot=new THREE.Mesh(
      new THREE.SphereGeometry(0.03,8,8),
      new THREE.MeshBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.9})
    );
    dot.position.copy(kleinVerts[i]);
    genusGroup.add(dot);
    // Glow halo
    const gh=new THREE.Mesh(
      new THREE.SphereGeometry(0.08,6,6),
      new THREE.MeshBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.12,depthWrite:false})
    );
    gh.position.copy(kleinVerts[i]);
    genusGroup.add(gh);
  }

  // Connect nearby vertices with golden edges (84 edges)
  const edgeSet=new Set();
  const sortedPairs=[];
  for(let i=0;i<24;i++){
    const dists=[];
    for(let j=0;j<24;j++){
      if(i===j) continue;
      dists.push({j,d:kleinVerts[i].distanceTo(kleinVerts[j])});
    }
    dists.sort((a,b)=>a.d-b.d);
    // Connect to 7 nearest (each vertex has degree 7 in {3,7})
    for(let k=0;k<Math.min(7,dists.length);k++){
      const key=Math.min(i,dists[k].j)+'-'+Math.max(i,dists[k].j);
      if(!edgeSet.has(key)){
        edgeSet.add(key);
        sortedPairs.push([i,dists[k].j]);
      }
    }
  }

  const edgeMat=new THREE.LineBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.35});
  sortedPairs.forEach(([a,b])=>{
    const pts=[kleinVerts[a],kleinVerts[b]];
    genusGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),edgeMat));
  });
}

// ═══════════════════════════════════════════════
// HYPERBOLOID MODEL — {7,3} on negative-curvature surface
// ═══════════════════════════════════════════════
function buildHyperboloid(){
  while(hyperGroup.children.length) hyperGroup.remove(hyperGroup.children[0]);

  // Hyperboloid sheet mesh
  const hSegs=80, rSegs=60;
  const positions=[], indices=[], uvs=[];
  const maxR=2.2;
  for(let i=0;i<=rSegs;i++){
    const rr=maxR*i/rSegs;
    for(let j=0;j<=hSegs;j++){
      const theta=TAU*j/hSegs;
      const x=rr*Math.cos(theta);
      const z=rr*Math.sin(theta);
      const y=0.15*(rr*rr); // paraboloid approximation of hyperboloid
      positions.push(x,y,z);
      uvs.push(j/hSegs,i/rSegs);
    }
  }
  for(let i=0;i<rSegs;i++){
    for(let j=0;j<hSegs;j++){
      const a=i*(hSegs+1)+j, b=a+hSegs+1;
      indices.push(a,b,a+1, b,b+1,a+1);
    }
  }
  const hGeo=new THREE.BufferGeometry();
  hGeo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  hGeo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  hGeo.setIndex(indices);
  hGeo.computeVertexNormals();

  const surfMat=new THREE.MeshStandardMaterial({
    color:0x1a0a2e, transparent:true, opacity:0.2, side:THREE.DoubleSide,
    metalness:0.2, roughness:0.7, depthWrite:false
  });
  hyperGroup.add(new THREE.Mesh(hGeo,surfMat));

  // Project heptagons onto hyperboloid
  function hyperHept(cx,cz,r,depth,pa){
    if(depth>Math.min(maxDepth,4)||r<0.02) return;
    const pts=[];
    for(let i=0;i<7;i++){
      const a=TAU*i/7+pa;
      const px=cx+Math.cos(a)*r, pz=cz+Math.sin(a)*r;
      const py=0.15*(px*px+pz*pz)+0.01;
      pts.push(new THREE.Vector3(px,py,pz));
    }
    // Edges
    const hue=(depth*50+180)%360;
    const eMat=new THREE.LineBasicMaterial({color:new THREE.Color(`hsl(${hue},60%,55%)`),transparent:true,opacity:0.5-depth*0.08});
    for(let i=0;i<7;i++){
      const geo=new THREE.BufferGeometry().setFromPoints([pts[i],pts[(i+1)%7]]);
      hyperGroup.add(new THREE.Line(geo,eMat));
    }
    // Vertices
    if(depth<3){
      const vMat=new THREE.MeshBasicMaterial({color:new THREE.Color(`hsl(${hue},50%,65%)`),transparent:true,opacity:0.7});
      pts.forEach(p=>{
        const d=new THREE.Mesh(new THREE.SphereGeometry(0.018,6,6),vMat);
        d.position.copy(p);
        hyperGroup.add(d);
      });
    }
    // Recurse
    if(depth<Math.min(maxDepth,4)){
      for(let i=0;i<7;i++){
        const a=TAU*i/7+TAU/14+pa;
        const shrink=0.50-depth*0.02;
        const ncx=cx+Math.cos(a)*r*1.35, ncz=cz+Math.sin(a)*r*1.35;
        if(Math.sqrt(ncx*ncx+ncz*ncz)+r*shrink<maxR*0.92){
          hyperHept(ncx,ncz,r*shrink,depth+1,a+PI);
        }
      }
    }
  }
  hyperHept(0,0,maxR*0.25,0,0);

  // Lights for hyperboloid
  const al=new THREE.AmbientLight(0x222244,0.5);
  al.userData.hyperLight=true;
  hyperGroup.add(al);
  const dl=new THREE.DirectionalLight(0xbf7fff,0.6);
  dl.position.set(2,4,3);
  dl.userData.hyperLight=true;
  hyperGroup.add(dl);
}

// ═══════════════════════════════════════════════
// FANO PLANE — PG(2,2): 7 points, 7 lines
// PSL(2,7) ≅ GL(3,F₂) acts on this
// ═══════════════════════════════════════════════
function buildFano(){
  while(fanoGroup.children.length) fanoGroup.remove(fanoGroup.children[0]);

  // 7 points: 6 on hexagon + 1 center, lifted into 3D
  const fanoR=1.2, fanoY=1.0;
  const fanoPoints=[];
  fanoPoints.push(new THREE.Vector3(0,fanoY,0)); // center
  for(let i=0;i<6;i++){
    const a=TAU*i/6;
    fanoPoints.push(new THREE.Vector3(Math.cos(a)*fanoR,fanoY,Math.sin(a)*fanoR));
  }

  // 7 lines (each through 3 collinear points)
  const fanoLines=[
    [0,1,2],[0,3,4],[0,5,6], // lines through center
    [1,3,5],[2,4,6],         // alternating hexagon triples
    [1,4,6],[2,3,5]           // remaining triples (one is the "circle" line)
  ];
  // Note: in standard Fano labeling with center=0, hex=1-6

  // Point spheres
  const fanoColors=[0xc8a96e,0xff3355,0x00e5ff,0xbf7fff,0x44ff88,0xff6b35,0x88aaff];
  fanoPoints.forEach((p,i)=>{
    const sphere=new THREE.Mesh(
      new THREE.SphereGeometry(0.06,16,16),
      new THREE.MeshBasicMaterial({color:fanoColors[i],transparent:true,opacity:0.9})
    );
    sphere.position.copy(p);
    fanoGroup.add(sphere);

    // Glow halo — larger transparent sphere for bloom pickup
    const glow=new THREE.Mesh(
      new THREE.SphereGeometry(0.14,12,12),
      new THREE.MeshBasicMaterial({color:fanoColors[i],transparent:true,opacity:0.1,depthWrite:false})
    );
    glow.position.copy(p);
    fanoGroup.add(glow);
  });

  // Line tubes
  fanoLines.forEach((line,li)=>{
    const curve=new THREE.CatmullRomCurve3(line.map(i=>fanoPoints[i]));
    const tubeGeo=new THREE.TubeGeometry(curve,20,0.012,8,false);
    const hue=(li*51)%360;
    const tubeMat=new THREE.MeshBasicMaterial({
      color:new THREE.Color(`hsl(${hue},55%,50%)`),
      transparent:true, opacity:0.45
    });
    fanoGroup.add(new THREE.Mesh(tubeGeo,tubeMat));
  });

  // Central label ring showing "PG(2,2)"
  const labelRing=new THREE.Mesh(
    new THREE.TorusGeometry(fanoR*0.5,0.005,8,64),
    new THREE.MeshBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.1})
  );
  labelRing.position.y=fanoY;
  labelRing.rotation.x=PI/2;
  fanoGroup.add(labelRing);

  // Incidence indicator lines (faint connections showing duality)
  const incMat=new THREE.LineBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.06});
  for(let i=0;i<7;i++){
    for(let j=i+1;j<7;j++){
      const pts=[fanoPoints[i],fanoPoints[j]];
      fanoGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),incMat));
    }
  }
}

// ═══════════════════════════════════════════════
// SYMMETRY ORBITS — 168 elements of PSL(2,7)
// Cayley graph with generators of order 2, 3, 7
// ═══════════════════════════════════════════════
function buildSymmetry(){
  while(symmetryGroup.children.length) symmetryGroup.remove(symmetryGroup.children[0]);

  // Arrange 168 elements on a sphere (Fibonacci spiral for even distribution)
  const N=168;
  const symR=2.0;
  const nodes=[];
  const goldenAngle=PI*(3-Math.sqrt(5));

  for(let i=0;i<N;i++){
    const y=1-2*i/(N-1);
    const radius=Math.sqrt(1-y*y);
    const theta=goldenAngle*i;
    const pos=new THREE.Vector3(
      Math.cos(theta)*radius*symR,
      y*symR,
      Math.sin(theta)*radius*symR
    );
    nodes.push(pos);

    // Color by coset: 168 = 24*7 = 56*3 = 84*2
    const coset7=Math.floor(i/24); // 7 cosets of size 24
    const hue=(coset7*51+15)%360;
    const dot=new THREE.Mesh(
      new THREE.SphereGeometry(0.025,6,6),
      new THREE.MeshBasicMaterial({
        color:new THREE.Color(`hsl(${hue},55%,50%)`),
        transparent:true, opacity:0.7
      })
    );
    dot.position.copy(pos);
    symmetryGroup.add(dot);
  }

  // Generator connections: order-7 element connects i → (i+24)%168
  const gen7Mat=new THREE.LineBasicMaterial({color:0xbf7fff,transparent:true,opacity:0.08});
  for(let i=0;i<N;i++){
    const j=(i+24)%N;
    symmetryGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([nodes[i],nodes[j]]),gen7Mat
    ));
  }

  // Order-3 generator: connects i → (i+56)%168
  const gen3Mat=new THREE.LineBasicMaterial({color:0x00e5ff,transparent:true,opacity:0.06});
  for(let i=0;i<N;i++){
    const j=(i+56)%N;
    symmetryGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([nodes[i],nodes[j]]),gen3Mat
    ));
  }

  // Order-2 generator: connects i → (i+84)%168
  const gen2Mat=new THREE.LineBasicMaterial({color:0xff6b35,transparent:true,opacity:0.06});
  for(let i=0;i<N;i++){
    const j=(i+84)%N;
    symmetryGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([nodes[i],nodes[j]]),gen2Mat
    ));
  }

  // Central sphere showing |G|=168
  const coreSphere=new THREE.Mesh(
    new THREE.SphereGeometry(0.08,16,16),
    new THREE.MeshBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.3})
  );
  symmetryGroup.add(coreSphere);
}

// ═══════════════════════════════════════════════
// σ-CHAIN CONNECTION — 28 → 56 → 120 → 168
// Showing how Klein's 168 emerges from sigma
// ═══════════════════════════════════════════════
function buildSigma(){
  while(sigmaGroup.children.length) sigmaGroup.remove(sigmaGroup.children[0]);

  const sigmaValues=[
    {n:28, sigma:56, label:'σ(28)=56', color:0x44ff88, y:0},
    {n:56, sigma:120, label:'σ(56)=120', color:0x00e5ff, y:0.8},
    {n:120, sigma:360, label:'σ(120)=360', color:0xbf7fff, y:1.6},
    {n:60, sigma:168, label:'σ(60)=168', color:0xc8a96e, y:2.4}
  ];

  sigmaValues.forEach((sv,si)=>{
    const ringR=1.0+si*0.3;
    // Place n points on a ring
    for(let i=0;i<Math.min(sv.n,60);i++){
      const a=TAU*i/Math.min(sv.n,60);
      const dot=new THREE.Mesh(
        new THREE.SphereGeometry(0.02,6,6),
        new THREE.MeshBasicMaterial({color:sv.color,transparent:true,opacity:0.6})
      );
      dot.position.set(Math.cos(a)*ringR, sv.y, Math.sin(a)*ringR);
      sigmaGroup.add(dot);
    }

    // Ring circle
    const ringGeo=new THREE.RingGeometry(ringR-0.005,ringR+0.005,128);
    const ringMesh=new THREE.Mesh(ringGeo,new THREE.MeshBasicMaterial({
      color:sv.color,transparent:true,opacity:0.12,side:THREE.DoubleSide
    }));
    ringMesh.position.y=sv.y;
    ringMesh.rotation.x=-PI/2;
    sigmaGroup.add(ringMesh);

    // Vertical connecting lines to next level
    if(si<sigmaValues.length-1){
      const nextY=sigmaValues[si+1].y;
      for(let i=0;i<6;i++){
        const a=TAU*i/6;
        const pts=[
          new THREE.Vector3(Math.cos(a)*ringR*0.3, sv.y, Math.sin(a)*ringR*0.3),
          new THREE.Vector3(Math.cos(a+0.2)*(ringR+0.3)*0.3, nextY, Math.sin(a+0.2)*(ringR+0.3)*0.3)
        ];
        sigmaGroup.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(pts),
          new THREE.LineBasicMaterial({color:sv.color,transparent:true,opacity:0.1})
        ));
      }
    }
  });

  // Final: 168 dots on outer shell — the Klein quartic order
  const kleinMat=new THREE.MeshBasicMaterial({color:0xc8a96e,transparent:true,opacity:0.4});
  for(let i=0;i<168;i++){
    const phi=Math.acos(1-2*(i+0.5)/168);
    const theta=PI*(1+Math.sqrt(5))*i;
    const rr=2.5;
    const dot=new THREE.Mesh(new THREE.SphereGeometry(0.015,4,4),kleinMat);
    dot.position.set(
      rr*Math.sin(phi)*Math.cos(theta),
      rr*Math.cos(phi)+1.2,
      rr*Math.sin(phi)*Math.sin(theta)
    );
    sigmaGroup.add(dot);
  }
}

// ═══════════════════════════════════════════════
// MODE SWITCHING
// ═══════════════════════════════════════════════
function setMode(idx){
  currentMode=idx;
  const allGroups=[poincareGroup,genusGroup,hyperGroup,fanoGroup,dualGroup,symmetryGroup,sigmaGroup,boundaryGroup];

  if(idx===7){ // ALL mode
    allGroups.forEach(g=>g.visible=true);
    modes.forEach(m=>{if(m.build&&!m.group.children.length) m.build();});
  } else {
    allGroups.forEach(g=>g.visible=false);
    const m=modes[idx];
    if(m.group){
      m.group.visible=true;
      if(!m.group.children.length) m.build();
    }
    if(idx===0||idx===4) boundaryGroup.visible=vis.boundary; // Poincaré & dual need boundary
  }

  // Update mode buttons
  document.querySelectorAll('.mbtn').forEach((b,i)=>b.classList.toggle('active',i===idx));

  // Show narration
  showNarration(modes[idx].narr, modes[idx].sub, modes[idx].eq);

  // Update HUD
  updateHUD();
}

function showNarration(title,text,eq){
  const el=document.getElementById('narr');
  document.getElementById('nt').textContent=title;
  document.getElementById('nx').textContent=text;
  document.getElementById('ne').textContent=eq||'';
  el.classList.add('show');
  clearTimeout(narrTimer);
  narrTimer=setTimeout(()=>el.classList.remove('show'),3500);
}

function updateHUD(){
  const m=modes[currentMode];
  document.getElementById('htl').innerHTML=`<div class="hi hi-gold">${m.name}</div><div class="hi hi-dim">${m.hud}</div>`;
  document.getElementById('htr').innerHTML=`<div class="hi hi-cyan">|PSL(2,7)| = 168</div><div class="hi hi-dim">84(g−1) · Hurwitz bound</div>`;
  const stats=currentMode===0?`<div class="hi hi-dim">heptagons: ~${heptCount}</div><div class="hi hi-dim">depth: ${maxDepth}</div>`:'';
  document.getElementById('hbl').innerHTML=stats;
  document.getElementById('hbr').innerHTML=`<div class="hi hi-dim">drag · scroll · pinch</div><div class="hi hi-dim">1-0 viewpoints · M modes</div>`;
}

function updateVisibility(){
  if(currentMode===0||currentMode===4) boundaryGroup.visible=vis.boundary;
  // Rebuild current mode to apply fill/edge/vert toggles
  const m=modes[currentMode];
  if(m.build&&currentMode<5){
    while(m.group.children.length) m.group.remove(m.group.children[0]);
    m.build();
  }
}

// VIEWPOINT FLIGHTS
// ═══════════════════════════════════════════════
function flyTo(idx){
  const vp=viewpoints[idx];
  vpTarget=new THREE.Vector3(...vp.pos);
  vpLookTarget=new THREE.Vector3(...vp.target);
  vpLerp=0;
  document.querySelectorAll('.vpbtn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

let sweepIdx=-1, sweepTimer=null;
function startSweep(){
  sweepIdx=0;
  flyTo(0);
  clearInterval(sweepTimer);
  sweepTimer=setInterval(()=>{
    sweepIdx=(sweepIdx+1)%viewpoints.length;
    flyTo(sweepIdx);
    if(sweepIdx===viewpoints.length-1){clearInterval(sweepTimer);sweepTimer=null;}
  },3500);
}

};

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  const k=e.key;
  // Viewpoints 1-9,0
  if(k>='1'&&k<='9') flyTo(+k-1);
  if(k==='0') flyTo(9);
  // Mode cycle
  if(k==='m'||k==='M') setMode((currentMode+1)%modes.length);
  // Toggles
  if(k==='e'||k==='E'){vis.edges=!vis.edges;document.getElementById('t-edges').classList.toggle('on',vis.edges);updateVisibility();}
  if(k==='f'||k==='F'){vis.fills=!vis.fills;document.getElementById('t-fills').classList.toggle('on',vis.fills);updateVisibility();}
  if(k==='v'||k==='V'){vis.verts=!vis.verts;document.getElementById('t-verts').classList.toggle('on',vis.verts);updateVisibility();}
  if(k==='b'||k==='B'){vis.boundary=!vis.boundary;document.getElementById('t-boundary').classList.toggle('on',vis.boundary);updateVisibility();}
  // Depth
  if(k==='d'||k==='D'){
    maxDepth=Math.min(7,maxDepth+1);
    document.getElementById('sl-depth').value=maxDepth;
    document.getElementById('sv-depth').textContent=maxDepth;
    const m=modes[currentMode];
    if(m.build&&(currentMode===0||currentMode===2||currentMode===4)){
      while(m.group.children.length) m.group.remove(m.group.children[0]);
      m.build();
    }
  }
  // Sweep tour
  if(k===' '){e.preventDefault();startSweep();}
});

// ═══════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════
let lastTime=performance.now(), frameCount=0, fpsAccum=0;

function animate(now){
  requestAnimationFrame(animate);
  const dt=(now-lastTime)/1000;
  lastTime=now;
  t+=dt*speed;

  // FPS counter
  frameCount++;
  fpsAccum+=dt;
  if(fpsAccum>=0.5){
    document.getElementById('fps').textContent=Math.round(frameCount/fpsAccum)+' fps';
    frameCount=0;
    fpsAccum=0;
  }

  // Smooth camera flight
  if(vpTarget){
    vpLerp=Math.min(1,vpLerp+dt*1.2);
    const ease=1-Math.pow(1-vpLerp,3); // cubic ease-out
    camera.position.lerp(vpTarget,ease*0.08);
    controls.target.lerp(vpLookTarget,ease*0.08);
    if(vpLerp>=1) vpTarget=null;
  }

  controls.update();

  // Gentle rotation for modes that benefit from it
  if(currentMode===1) genusGroup.rotation.y+=dt*speed*0.15;
  if(currentMode===3) fanoGroup.rotation.y+=dt*speed*0.2;
  if(currentMode===5) symmetryGroup.rotation.y+=dt*speed*0.1;
  if(currentMode===6) sigmaGroup.rotation.y+=dt*speed*0.12;

  // Poincaré disk: subtle shimmer on edge opacity
  if(currentMode===0){
    edgeMats.forEach((m,d)=>{
      m.opacity=(0.5-d*0.05)*opacity*(0.85+0.15*Math.sin(t*2+d*0.5));
    });
  }

  composer.render();
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
buildPoincare();
setMode(0);
flyTo(0);
animate(performance.now());

</script>
